spring.datasource.url=jdbc:h2:mem:productsite-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.main.allow-bean-definition-overriding=true
spring.main.lazy-initialization=true
spring.autoconfigure.exclude=\
org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,\
org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatConnectionAutoConfiguration,\
org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingAutoConfiguration,\
org.springframework.ai.model.google.genai.autoconfigure.embedding.GoogleGenAiEmbeddingConnectionAutoConfiguration,\
org.springframework.ai.model.stabilityai.autoconfigure.StabilityAiImageAutoConfiguration,\
org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
