spring.application.name=productSite
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:atharva11}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.jackson.deserialization.fail-on-null-for-primitives=false
spring.servlet.multipart.enabled=true

#for chat client
spring.ai.google.genai.api-key=${GOOGLE_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

#for image generation
spring.ai.stabilityai.api-key=${STABILITY_API_KEY}
spring.ai.stabilityai.image.options.model=stable-diffusion-xl-1024-v1-0

#vector database qdrant
spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:localhost}
spring.ai.vectorstore.qdrant.port=${QDRANT_PORT:6334}
spring.ai.vectorstore.qdrant.api-key=${QDRANT_API_KEY}
spring.ai.vectorstore.qdrant.use-tls=${QDRANT_USE_TLS:true}

#embedding config (uses Google Gemini via API key - not Vertex AI)
spring.ai.google.genai.embedding.api-key=${GOOGLE_API_KEY}
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001
